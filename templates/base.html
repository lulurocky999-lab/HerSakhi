{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}HerSakhi — AI Career Companion for Women{% endblock %}</title>
  <meta name="description" content="HerSakhi is your intelligent AI career companion, guiding women from education to employment with personalized mentorship, skill building, and opportunity discovery." />

  <!-- Preconnect for fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="{% static 'css/main.css' %}" />

  <!-- Import Map for ES Modules without Vite -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "gsap": "https://unpkg.com/gsap@3.12.5/index.js",
        "gsap/ScrollTrigger": "https://unpkg.com/gsap@3.12.5/ScrollTrigger.js",
        "@studio-freight/lenis": "https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.mjs",
        "lenis": "https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.mjs",
        "split-type": "https://unpkg.com/split-type@0.3.4/dist/index.js"
      }
    }
  </script>

  {% block extra_head %}{% endblock %}
</head>
<body>

  <!-- ============================ -->
  <!-- LOADING OVERLAY              -->
  <!-- ============================ -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-orb"></div>
  </div>

  <!-- ============================ -->
  <!-- CUSTOM CURSOR (desktop)     -->
  <!-- ============================ -->
  <div id="custom-cursor" class="custom-cursor"></div>
  
  {% block content %}{% endblock %}

  <!-- Main entry script -->
  <script type="module" src="{% static 'js/main.js' %}"></script>
  
  {% block extra_scripts %}{% endblock %}
</body>
</html>
